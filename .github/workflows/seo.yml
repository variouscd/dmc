name: SEO Automation (Sitemap, Robots & IndexNow)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  seo-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SEO Files
        run: |
          DOMAIN="https://dmc.variouscd.com"
          
          # 1. ГЕНЕРАЦИЯ SITEMAP
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          find . -name "index.html" | while read file; do
            path=$(echo "$file" | sed 's|^\./||' | sed 's|index.html$||')
            url="${DOMAIN}/${path}"
            clean_url=$(echo "$url" | sed 's|[^:]//|/|g')
            lastmod=$(git log -1 --format="%as" -- "$file")
            
            priority="0.8"
            if [ "$path" = "" ] || [ "$path" = "/" ]; then priority="1.0"; fi

            echo "  <url><loc>$clean_url</loc><lastmod>$lastmod</lastmod><priority>$priority</priority></url>" >> sitemap.xml
          done
          echo '</urlset>' >> sitemap.xml

          # 2. ГЕНЕРАЦИЯ ROBOTS.TXT
          echo "User-agent: *" > robots.txt
          echo "Allow: /" >> robots.txt
          echo "" >> robots.txt
          echo "Sitemap: ${DOMAIN}/sitemap.xml" >> robots.txt

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sitemap.xml robots.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update SEO files" && git push)

      - name: Send IndexNow Notification
        run: |
          # Собираем список всех URL из sitemap в формате JSON массива
          DOMAIN="https://dmc.variouscd.com"
          # Ключ IndexNow (должен совпадать с файлом в корне сайта)
          KEY="3f4e8b7c2a" 
          
          # Извлекаем все URL из созданного sitemap.xml
          URL_LIST=$(grep -Po '(?<=<loc>)[^<]+' sitemap.xml | jq -R . | jq -s .)

          curl -X POST "https://api.indexnow.org/indexnow" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "{
            \"host\": \"dmc.variouscd.com\",
            \"key\": \"$KEY\",
            \"keyLocation\": \"${DOMAIN}/${KEY}.txt\",
            \"urlList\": $URL_LIST
          }"
