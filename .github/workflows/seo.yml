name: SEO Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  seo:
    runs-on: ubuntu-latest

steps:

  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Install tools
    run: |
      sudo apt-get update
      sudo apt-get install -y curl grep sed jq wget

  - name: Crawl site
    run: |
      DOMAIN="https://dmc.variouscd.com"

      echo "$DOMAIN/" > queue.txt
      touch visited.txt

      for i in {1..8}; do
        cp queue.txt current.txt
        > queue.txt

        while read url; do

          if grep -qx "$url" visited.txt; then
            continue
          fi

          echo "$url" >> visited.txt

          curl -L -s "$url" \
          | grep -Eo 'href="[^"#]+"' \
          | cut -d'"' -f2 \
          | sed 's/#.*//' \
          | grep -E '^/|^https://dmc.variouscd.com' \
          | sed "s|^/|$DOMAIN/|" \
          | sed "s|//$|/|" \
          >> queue.txt

        done < current.txt

        sort -u queue.txt -o queue.txt
      done

      cat visited.txt \
      | grep "^$DOMAIN" \
      | grep -vE '\.(png|jpg|jpeg|gif|svg|css|js|ico|pdf|zip|mp3|mp4)$' \
      | grep -v '/tag/' \
      | grep -v '/author/' \
      | grep -v '/page/[0-9]\+/attachment' \
      | sort -u > urls.txt

      echo "$DOMAIN/" >> urls.txt
      sort -u urls.txt -o urls.txt

  - name: Generate sitemap
    run: |
      DOMAIN="https://dmc.variouscd.com"
      TODAY=$(date +%F)

      echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
      echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

      while read url; do
        if [ "$url" = "$DOMAIN/" ]; then
          PRIORITY="1.0"
        else
          PRIORITY="0.8"
        fi

        echo "<url>" >> sitemap.xml
        echo "<loc>$url</loc>" >> sitemap.xml
        echo "<lastmod>$TODAY</lastmod>" >> sitemap.xml
        echo "<changefreq>weekly</changefreq>" >> sitemap.xml
        echo "<priority>$PRIORITY</priority>" >> sitemap.xml
        echo "</url>" >> sitemap.xml
      done < urls.txt

      echo "</urlset>" >> sitemap.xml

  - name: Generate robots.txt
    run: |
      DOMAIN="https://dmc.variouscd.com"

      echo "User-agent: *" > robots.txt
      echo "Allow: /" >> robots.txt
      echo "" >> robots.txt
      echo "Sitemap: $DOMAIN/sitemap.xml" >> robots.txt

  - name: Commit changes
    run: |
      git config --global user.name "seo-bot"
      git config --global user.email "seo-bot@github.com"

      git add sitemap.xml robots.txt urls.txt

      if git diff --cached --quiet; then
        echo "No changes"
      else
        git commit -m "SEO auto update"
        git push
      fi

  - name: Ping Bing
    run: |
      SITEMAP="https://dmc.variouscd.com/sitemap.xml"
      curl -s "https://www.bing.com/ping?sitemap=$SITEMAP" || true

  - name: Ping Google
    run: |
      SITEMAP="https://dmc.variouscd.com/sitemap.xml"
      curl -s "https://www.google.com/ping?sitemap=$SITEMAP" || true

  - name: Send IndexNow
    run: |
      URLS=$(head -n 100 urls.txt | jq -R . | jq -s .)

      curl -X POST "https://api.indexnow.org/indexnow" \
      -H "Content-Type: application/json" \
      -d "{
        \"host\": \"dmc.variouscd.com\",
        \"key\": \"3f4e8b7c2a\",
        \"urlList\": $URLS
      }" || true
