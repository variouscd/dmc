name: SEO Automation v12

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  seo:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SEO tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget xmllint

      - name: Create folders
        run: |
          mkdir -p seo
          rm -f urls.txt

      - name: Crawl site and collect URLs
        run: |
          DOMAIN="https://dmc.variouscd.com"

          wget \
            --recursive \
            --level=5 \
            --no-clobber \
            --no-parent \
            --spider \
            --quiet \
            --domains dmc.variouscd.com \
            $DOMAIN 2>&1 \
            | grep '^--' \
            | awk '{print $3}' \
            | grep "$DOMAIN" \
            | sort -u \
            > urls.txt

      - name: Generate sitemap
        run: |
          DOMAIN="https://dmc.variouscd.com"
          TODAY=$(date +%F)

          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          while read url; do

            CLEAN=$(echo "$url" | tr -d '\n\r\t ')

            echo "<url>" >> sitemap.xml
            echo "<loc>$CLEAN</loc>" >> sitemap.xml
            echo "<lastmod>$TODAY</lastmod>" >> sitemap.xml
            echo "<changefreq>weekly</changefreq>" >> sitemap.xml
            echo "<priority>0.8</priority>" >> sitemap.xml
            echo "</url>" >> sitemap.xml

          done < urls.txt

          echo "</urlset>" >> sitemap.xml

      - name: Validate XML sitemap
        run: xmllint --noout sitemap.xml

      - name: Generate robots.txt
        run: |
          DOMAIN="https://dmc.variouscd.com"

          echo "User-agent: *" > robots.txt
          echo "Allow: /" >> robots.txt
          echo "" >> robots.txt
          echo "Sitemap: ${DOMAIN}/sitemap.xml" >> robots.txt

      - name: Check broken links
        run: |
          echo "Checking URLs..."
          while read url; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$url")

            if [ "$STATUS" -ge 400 ]; then
              echo "Broken: $url ($STATUS)"
            fi
          done < urls.txt

      - name: Commit SEO updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add sitemap.xml robots.txt

          if git diff --cached --quiet; then
            echo "No SEO changes"
          else
            git commit -m "SEO: automatic sitemap update"
            git push
          fi

      - name: Ping search engines
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://dmc.variouscd.com/sitemap.xml" || true
          curl -s "https://www.bing.com/ping?sitemap=https://dmc.variouscd.com/sitemap.xml" || true
