name: SEO Sitemap

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate sitemap
        run: |
          DOMAIN="https://dmc.variouscd.com"
          TODAY=$(date +%F)

          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          find . -type f -name "*.html" ! -path "./.github/*" | while read file; do

            url=$(echo "$file" | sed 's|^\./||' | sed 's|index.html||')

            echo "<url>" >> sitemap.xml
            echo "<loc>${DOMAIN}/${url}</loc>" >> sitemap.xml
            echo "<lastmod>${TODAY}</lastmod>" >> sitemap.xml
            echo "<changefreq>weekly</changefreq>" >> sitemap.xml
            echo "<priority>0.8</priority>" >> sitemap.xml
            echo "</url>" >> sitemap.xml

          done

          echo "</urlset>" >> sitemap.xml

      - name: Commit sitemap
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add sitemap.xml

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update sitemap"
            git push
          fi
