name: SEO Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  seo:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl grep sed jq

      - name: Crawl site
        run: |
          DOMAIN="https://dmc.variouscd.com"

          curl -s $DOMAIN \
          | grep -oP '(?<=href=")[^"]*' \
          | grep "^/" \
          | sed "s|^|$DOMAIN|" \
          | sort -u > urls.txt

          echo "$DOMAIN/" >> urls.txt

          if [ ! -s urls.txt ]; then
            echo "$DOMAIN/" > urls.txt
          fi

          sort -u urls.txt -o urls.txt

      - name: Generate sitemap
        run: |
          DOMAIN="https://dmc.variouscd.com"
          TODAY=$(date +%F)

          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          while read url; do
            echo "<url>" >> sitemap.xml
            echo "<loc>$url</loc>" >> sitemap.xml
            echo "<lastmod>$TODAY</lastmod>" >> sitemap.xml
            echo "<changefreq>weekly</changefreq>" >> sitemap.xml
            echo "<priority>0.8</priority>" >> sitemap.xml
            echo "</url>" >> sitemap.xml
          done < urls.txt

          echo "</urlset>" >> sitemap.xml

      - name: Generate robots.txt
        run: |
          DOMAIN="https://dmc.variouscd.com"

          echo "User-agent: *" > robots.txt
          echo "Allow: /" >> robots.txt
          echo "" >> robots.txt
          echo "Sitemap: $DOMAIN/sitemap.xml" >> robots.txt

      - name: Commit changes
        run: |
          git config --global user.name "seo-bot"
          git config --global user.email "seo-bot@github.com"

          git add sitemap.xml robots.txt urls.txt

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "SEO auto update"
            git push
          fi

      - name: Ping search engines
        run: |
          SITEMAP="https://dmc.variouscd.com/sitemap.xml"

          curl -s "https://www.bing.com/ping?sitemap=$SITEMAP" || true
          curl -s "https://www.bing.com/webmaster/ping.aspx?siteMap=$SITEMAP" || true

          URLS=$(jq -R . < urls.txt | jq -s .)

          curl -X POST "https://api.indexnow.org/indexnow" \
          -H "Content-Type: application/json" \
          -d "{
            \"host\": \"dmc.variouscd.com\",
            \"key\": \"3f4e8b7c2a\",
            \"urlList\": $URLS
          }" || true
